name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Prepare gh-pages output
        run: |
          # The TanStack Start + Nitro build outputs to .output/public for static assets
          # Find the correct output directory
          if [ -d ".output/public" ]; then
            OUTPUT_DIR=".output/public"
          elif [ -d "dist/client" ]; then
            OUTPUT_DIR="dist/client"
          elif [ -d "dist" ]; then
            OUTPUT_DIR="dist"
          else
            echo "ERROR: Could not find build output directory"
            ls -la
            exit 1
          fi
          echo "Using output dir: $OUTPUT_DIR"
          # Ensure CNAME exists
          echo "air7drop.7all.com.br" > "$OUTPUT_DIR/CNAME"
          # Create .nojekyll to prevent GitHub Pages from ignoring files starting with _
          touch "$OUTPUT_DIR/.nojekyll"
          # Create 404.html as copy of index.html for SPA routing
          if [ -f "$OUTPUT_DIR/index.html" ]; then
            cp "$OUTPUT_DIR/index.html" "$OUTPUT_DIR/404.html"
          fi
          echo "OUTPUT_DIR=$OUTPUT_DIR" >> $GITHUB_ENV

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUTPUT_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
